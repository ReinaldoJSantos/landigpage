<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Automação Inteligente</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <h1>🚀 Pare de perder clientes</h1>
        <p>Automatize seu atendimento e receba contatos organizados em tempo real</p>

        <form id="leadForm">
            <input type="text" id="nome" placeholder="Seu nome" required />
            <input type="text" id="telefone" placeholder="Seu WhatsApp" required />
            <textarea id="mensagem" placeholder="Como podemos te ajudar?"></textarea>

            <button type="submit" id="btn">
                🚀 Quero automatizar meu atendimento
            </button>
        </form>
        <p style="font-size:12px; color:#94a3b8; margin-top:10px;">
            🔒 Seus dados estão seguros • Não enviamos spam        </p>
        <div class="msg" id="msg"></div>
        <div class="badge">⚡ Resposta rápida • 🔒 Dados seguros</div></div>

    <script>
        const form = document.getElementById("leadForm");
            const msg = document.getElementById("msg");
            const btn = document.getElementById("btn");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                btn.innerText = "Enviando...";
                btn.classList.add("loading");
                btn.style.background = "16a34a"

                try {
                    const response = await fetch("https://https://automacao-leads-lblw.onrender.com/lead", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            nome: document.getElementById("nome").value,
                            telefone: document.getElementById("telefone").value,
                            mensagem: document.getElementById("mensagem").value
                        })
                    });

                    if (response.ok) {
                        msg.innerText = "✅ Recebemos seu contato! Em breve você será atendido.";
                        form.reset();
                    } else {
                        msg.innerText = "❌ Algo deu errado. Tente novamente.";
                    }

                } catch (error) {
                    msg.innerText = "❌ Falha na conexão.";
                }

                btn.innerText = "🚀 Quero automatizar meu atendimento";
                btn.classList.remove("loading");
            });
    </script>

</body>

</html>
