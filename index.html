<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Automação Inteligente</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <h1>Automação Inteligente 🚀</h1>
        <p>Solicite atendimento automático</p>

        <form id="leadForm">
            <input type="text" id="nome" placeholder="Seu nome" required />
            <input type="text" id="telefone" placeholder="Seu telefone" required />
            <textarea id="mensagem" placeholder="Digite sua mensagem"></textarea>

            <button type="submit">Enviar</button>
        </form>

        <div class="msg" id="msg"></div>
    </div>

    <script>
        document.getElementById("leadForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const msg = document.getElementById("msg");
            msg.innerText = "Enviando...";

            try {
                const response = await fetch("https://automacao-leads-lblw.onrender.com/lead", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        nome: document.getElementById("nome").value,
                        telefone: document.getElementById("telefone").value,
                        mensagem: document.getElementById("mensagem").value
                    })
                });

                if (response.ok) {
                    msg.innerText = "✅ Enviado com sucesso!";
                    document.getElementById("leadForm").reset();
                } else {
                    msg.innerText = "❌ Erro ao enviar.";
                }

            } catch (error) {
                msg.innerText = "❌ Falha na conexão.";
            }
        });
    </script>

</body>

</html>
